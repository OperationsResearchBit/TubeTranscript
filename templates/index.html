<!DOCTYPE html>
<html>

<head>

<title>YouTube Transcript Generator</title>

<style>

body {
    font-family: Arial;
    max-width:900px;
    margin:40px auto;
}

input {
    width:80%;
    padding:12px;
}

button {
    padding:12px 20px;
    cursor:pointer;
}

textarea {
    width:100%;
    height:400px;
    margin-top:20px;
}

</style>

</head>


<body>

<h1>
YouTube Transcript Generator
</h1>


<input 
id="url"
placeholder="Paste YouTube URL"
/>

<button onclick="generate()">
Generate Transcript
</button>


<h3>Transcript</h3>

<textarea id="output"></textarea>


<script>

async function generate(){

    let url =
        document.getElementById("url").value;


    document.getElementById("output").value =
        "Loading...";


    let response =
        await fetch("/transcript",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                url:url
            })

        });


    let data =
        await response.json();


    if(data.error){

        document.getElementById("output").value =
            data.error;

    }

    else{

        document.getElementById("output").value =
            data.transcript;

    }

}


</script>


</body>

</html>
